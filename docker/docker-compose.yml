version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: quiz-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ai-quiz-system
    volumes:
      - mongodb_data:/data/db
    networks:
      - quiz-network

  redis:
    image: redis:7-alpine
    container_name: quiz-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - quiz-network

  server:
    build: ./server
    container_name: quiz-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ai-quiz-system?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - quiz-network

  client:
    build: ./client
    container_name: quiz-client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - quiz-network

volumes:
  mongodb_data:

networks:
  quiz-network:
    driver: bridge